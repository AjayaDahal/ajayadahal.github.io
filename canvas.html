<!DOCTYPE html>
<html lang="en">
<head>
  <title>Canvas Sample</title>
  <meta charset="UTF-8">
  <link rel="stylesheet" type="text/css" href="canvasStyles.css" media="screen">
</head>

<body>
  <div id="mainDiv">
    <header>
      <h3>A Canvas</h3>
    </header>
    
    <section>
      <h4>My first canvas </h4>
      <canvas id='myCanvas' width="500" height="300" style="border:1px solid #d3d3d3;">
        

      </canvas>
      
      
   
    <div class="loader">
  <div class="duo duo1">
    <div class="dot dot-a"></div>
    <div class="dot dot-b"></div>
  </div>
  <div class="duo duo2">
    <div class="dot dot-a"></div>
    <div class="dot dot-b"></div>
  </div>
 </section>

    <br><br>
    <footer>
      © Dahal_Ajaya
    </footer>
  

</div>

<script>
var c = document.getElementById("myCanvas");
var ctx = c.getContext("2d");

// Create gradient
var grd = ctx.createLinearGradient(0, 0, 500, 0);
grd.addColorStop(0, "red");
grd.addColorStop(1, "white");


// Fill with gradient
ctx.fillStyle = grd;
ctx.fillRect(10, 10, 500, 280);
ctx.font = "30px Arial";
ctx.strokeText("LOADING....", 150, 250);
document.write("");


</script>



</body>
</html>
