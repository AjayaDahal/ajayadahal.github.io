<html>

<head>
    <title>Contact Form Tutorial by Bootstrapious.com</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://fonts.googleapis.com/css?family=Lato:300,400,500' rel='stylesheet' type='text/css'>
    <script src='https://www.google.com/recaptcha/api.js'></script>
</head>

<body>
<aside>
<p>
Please use the <b><em>Contact-me Form</em></b>
to send me a message.
</p>
</aside>
<form action="https://formspree.io/ajayadahal1000@gmail.com" method="POST">
<label for="name">Name: </label>  
<input type="text" name="name" required data-error="Enter your name!"></br>
<label for="_replyto">Email: </label>  
<input type="email" name="_replyto" required data-error="Enter your Email!"></br>
<label for="message">Message: </label>  
<textarea id="message" name="message" rows="10" placeholder="Your message"></textarea>

<div class="g-recaptcha" data-sitekey="6Lc9taUUAAAAAEUav0GVHAHTguudjtjjz8P6Hhfe" data-callback="verifyRecaptchaCallback" data-expired-callback="expiredRecaptchaCallback"></div>
<input class="form-control d-none" data-recaptcha="true" required data-error="Please complete the Captcha">
</div>
                        
<input type="submit" value="Send">
</form> 
<p class="text-muted">
<strong>*</strong> These fields are required.
</p>
    
    <script data-cfasync="false" type="text/javascript">
   document.write("<h2>
            <em>Thanks</em> for contacting us!
            We will get back to you soon!
        </h2>");
    </script>
 
</body>

</html>
